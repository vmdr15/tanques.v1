<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000;
            color: #0f0;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            color: #0f0;
        }

        .button-link {
            display: inline-block;
            background-color: transparent;
            border: 2px solid #0f0;
            color: #0f0;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            transition: background-color 0.2s ease;
        }

        .button-link:hover {
            background-color: rgba(0, 255, 0, 0.1);
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const recordValue = document.getElementById('recordValue');
            const record = localStorage.getItem('tankGameRecord') || 0;
            recordValue.textContent = record;
        });
    </script>
</head>
<body>
    <h1>Bienvenido a mi juego de tanques</h1>
    <a class="button-link" href="tanques.html">Jugar</a>
    <p class="info" id="record">Récord de oleadas: <span id="recordValue">0</span></p>
</body>
</html>
